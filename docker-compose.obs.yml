services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.129.1
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "${OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.8.2
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - ./.deliverator/observability/tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:v3.7.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.deliverator/observability/prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.5.5
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - ./.deliverator/observability/loki-data:/loki

  promtail:
    image: grafana/promtail:3.5.5
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./.deliverator/logs:/var/log/deliverator:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:12.2.0
    ports:
      - "${GRAFANA_PORT:-3400}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./.deliverator/observability/grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
